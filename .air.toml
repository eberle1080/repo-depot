root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/server"
  cmd = "go build -o ./tmp/server ./server"
  delay = 1000
  include_dir = ["server", "shared"]
  exclude_dir = ["tmp", "cli"]
  include_ext = ["go"]
  kill_delay = "500ms"
  send_interrupt = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[screen]
  clear_on_rebuild = false
  keep_scroll = true
