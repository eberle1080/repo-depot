version: "2"
run:
  timeout: 10m
output:
  formats:
    text:
      path: stdout
      colors: true
linters:
  default: all
  disable:
    - gochecknoinits
    - depguard
    - exhaustruct
    - godox
    - testpackage
    - wrapcheck
    - nolintlint
    - nonamedreturns
    - funlen
    - cyclop
    - gocognit
    - gochecknoglobals
    - promlinter
    - maintidx
    - ireturn
    - nilnil
    - tagliatelle
    - wsl
    - godoclint
    - whitespace
    - err113
    - paralleltest
    - mnd
    - funcorder
    - dupl
    - nestif
    - varnamelen
    - lll
  settings:
    revive:
      rules:
        - name: var-naming
          disabled: false
          arguments:
            - ["ID", "API"]
    staticcheck:
      checks: ["all", "-ST1003"]
    misspell:
      locale: US
      mode: restricted
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
  exclusions:
    generated: lax
    rules:
      - text: "don't use ALL_CAPS in Go names"
        linters:
          - revive
